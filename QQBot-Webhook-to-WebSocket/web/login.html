<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket代理 - 身份验证</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --theme-gradient: linear-gradient(135deg, #5865F2, #7289DA);
            --theme-color: #5865F2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--theme-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--theme-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-floating {
            margin-bottom: 20px;
        }
        
        .form-control {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 14px 16px;
            height: auto;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--theme-color);
            box-shadow: 0 0 0 0.2rem rgba(88, 101, 242, 0.25);
        }
        
        .form-floating > label {
            padding: 14px 16px;
        }
        
        .btn-login {
            background: var(--theme-gradient);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s;
            font-size: 15px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.3);
            color: white;
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #ef4444;
            display: none;
        }
        
        .security-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .security-info i {
            color: var(--theme-color);
            margin-right: 5px;
        }
        
        .loading-spinner {
            display: none;
            margin-left: 8px;
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .login-container {
                padding: 30px 25px;
                border-radius: 16px;
            }
            
            .login-icon {
                width: 64px;
                height: 64px;
                font-size: 26px;
            }
            
            .login-title {
                font-size: 20px;
            }
            
            .login-subtitle {
                font-size: 13px;
            }
            
            .form-control {
                padding: 12px 14px;
            }
            
            .btn-login {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h1 class="login-title">身份验证</h1>
            <p class="login-subtitle">请输入密码以访问WebSocket代理管理面板</p>
        </div>
        
        <div class="error-message" id="admin-error">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="error-text"></span>
        </div>
        
        <form id="admin-login-form" novalidate>
            <div class="form-floating">
                <input type="password" class="form-control" id="admin-password" name="password" 
                       placeholder="请输入密码" required autofocus autocomplete="current-password">
                <label for="admin-password">
                    <i class="bi bi-key"></i> 管理员密码
                </label>
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="bi bi-unlock"></i>
                验证身份
                <span class="loading-spinner">
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                </span>
            </button>
        </form>
        
        <div class="security-info">
            <i class="bi bi-info-circle"></i>
            此页面受到安全验证保护<br>
            密码错误5次将封禁IP 24小时
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('token');
        if (accessToken) {
            localStorage.setItem('accessToken', accessToken);
        }
        const storedAccessToken = localStorage.getItem('accessToken') || '';
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('admin-password').focus();
            
            document.getElementById('admin-login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const loginBtn = this.querySelector('button[type="submit"]');
                const loadingSpinner = loginBtn.querySelector('.loading-spinner');
                loginBtn.disabled = true;
                loadingSpinner.style.display = 'inline-block';
                
                adminLogin().finally(() => {
                    loginBtn.disabled = false;
                    loadingSpinner.style.display = 'none';
                });
            });
        });
        
        function showError(message) {
            const errorElement = document.getElementById('admin-error');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorElement.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('admin-error').style.display = 'none';
        }
        
        async function adminLogin() {
            const password = document.getElementById('admin-password').value;
            hideError();
            
            if (!password) {
                showError('请填写管理员密码');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ password: password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success') {
                        localStorage.setItem('adminUsername', 'admin');
                        window.location.href = `/console?token=${storedAccessToken}`;
                    } else {
                        showError('登录失败，请检查密码');
                    }
                } else if (response.status === 401) {
                    const errorData = await response.json();
                    showError(errorData.detail || '密码错误');
                } else if (response.status === 403) {
                    const errorData = await response.json();
                    showError(errorData.detail || 'IP已被封禁');
                } else {
                    const errorData = await response.json();
                    showError(errorData.detail || '登录失败，请稍后重试');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showError('网络错误，请稍后重试');
            }
        }
    </script>
</body>
</html>
